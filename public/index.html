<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>niA Health</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gd:#2A5A1A;--gm:#4A8A2E;--gs:#7DBE57;--gl:#C2DFB0;--gp:#E8F4DF;--gg:#F2F8EE;
  --cr:#FAF9F5;--wh:#fff;--tx:#1A2F12;--tm:#3D5A2E;--tmu:#7A9A6A;
  --bd:rgba(74,138,46,0.14);--bdd:rgba(0,0,0,0.07);
  --co:#E05A3A;--cp:#FEF0EC;--bl:#4A7BC4;--bp:#E8F0FA;
  --pu:#7C5CBF;--lv:#EEE8F8;--yl:#D4860A;--ylp:#FEF6E8;
  --sid:#15270D;--err:#C0392B;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--tx);-webkit-font-smoothing:antialiased;}
#root{height:100%;}
button,input,textarea,select{font-family:inherit;}
a{color:inherit;text-decoration:none;}

/* LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:235px;min-width:235px;background:var(--sid);display:flex;flex-direction:column;height:100%;transition:width .25s;}
.sidebar.slim{width:62px;min-width:62px;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.75rem;background:var(--wh);border-bottom:1px solid var(--bdd);flex-shrink:0;}
.content-area{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gl) transparent;}
.content-area::-webkit-scrollbar{width:4px;}
.content-area::-webkit-scrollbar-thumb{background:var(--gl);border-radius:2px;}
.pg{padding:1.75rem 2rem;}

/* SIDEBAR */
.sb-top{padding:1.2rem 1.1rem .9rem;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-logo-row{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
.sb-collapse-btn{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;margin-left:auto;flex-shrink:0;}
.sb-collapse-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);}
.sb-admin-badge{display:inline-block;background:rgba(224,90,58,.2);color:#E05A3A;border-radius:4px;padding:1px 7px;font-size:.58rem;font-weight:600;margin-top:4px;}
.sb-nav{flex:1;overflow-y:auto;padding:.5rem 0;scrollbar-width:none;}
.sb-nav::-webkit-scrollbar{display:none;}
.sb-section{font-size:.53rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.2);padding:.65rem 1.1rem .25rem;}
.sb-item{display:flex;align-items:center;gap:10px;padding:.55rem 1.1rem;cursor:pointer;transition:background .15s;position:relative;white-space:nowrap;overflow:hidden;}
.sb-item:hover{background:rgba(255,255,255,.05);}
.sb-item.active{background:rgba(125,190,87,.13);}
.sb-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);height:55%;width:3px;background:var(--gs);border-radius:0 2px 2px 0;}
.sb-ico{font-size:1rem;width:20px;text-align:center;flex-shrink:0;}
.sb-lbl{font-size:.8rem;color:rgba(255,255,255,.58);transition:opacity .2s;}
.sb-item.active .sb-lbl{color:rgba(255,255,255,.95);font-weight:500;}
.sidebar.slim .sb-lbl,.sidebar.slim .sb-section{opacity:0;pointer-events:none;width:0;}
.sb-foot{padding:.75rem 1.1rem;border-top:1px solid rgba(255,255,255,.06);}
.sb-user-row{display:flex;align-items:center;gap:9px;}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;flex-shrink:0;}
.sb-uname{font-size:.78rem;color:rgba(255,255,255,.8);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-urole{font-size:.6rem;color:rgba(255,255,255,.35);white-space:nowrap;}

/* TOPBAR */
.tb-left h2{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--tx);}
.tb-left p{font-size:.7rem;color:var(--tmu);}
.tb-right{display:flex;align-items:center;gap:.65rem;}
.tb-score{display:flex;align-items:center;gap:7px;background:var(--gp);border:1px solid var(--gl);border-radius:50px;padding:5px 14px;cursor:pointer;}
.tb-score-n{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--gd);}
.tb-score-l{font-size:.68rem;color:var(--tm);}
.tb-icon{width:34px;height:34px;border-radius:50%;background:var(--gg);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;position:relative;transition:background .2s;}
.tb-icon:hover{background:var(--gp);}
.notif-badge{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--co);border-radius:50%;border:1.5px solid var(--wh);}

/* CARDS */
.card{background:var(--wh);border-radius:18px;border:1px solid var(--bdd);padding:1.35rem;}
.card-sm{background:var(--wh);border-radius:14px;border:1px solid var(--bdd);padding:1rem;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
.card-title{font-size:.88rem;font-weight:600;color:var(--tx);}
.card-action{font-size:.72rem;color:var(--gd);cursor:pointer;font-weight:500;}
.card-action:hover{text-decoration:underline;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;}

/* STAT CARDS */
.stat-card{background:var(--wh);border-radius:16px;border:1px solid var(--bdd);padding:1.1rem;}
.sc-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:.65rem;}
.sc-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--tx);line-height:1;}
.sc-lbl{font-size:.68rem;color:var(--tmu);margin-top:3px;}
.sc-delta{font-size:.65rem;font-weight:500;margin-top:5px;}
.up{color:var(--gs);}.dn{color:var(--co);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border-radius:50px;transition:all .18s;font-size:.875rem;}
.btn-g{background:var(--gd);color:#fff;padding:11px 22px;}
.btn-g:hover{background:var(--gm);}
.btn-g:disabled{background:var(--gl);cursor:not-allowed;}
.btn-o{background:transparent;color:var(--gd);border:1.5px solid var(--bd);padding:10px 20px;}
.btn-o:hover{background:var(--gp);}
.btn-sm{padding:7px 16px;font-size:.8rem;}
.btn-xs{padding:5px 12px;font-size:.72rem;}
.btn-danger{background:var(--err);color:#fff;padding:9px 18px;}
.btn-danger:hover{background:#a93226;}

/* FORMS */
.f-group{margin-bottom:.85rem;}
.f-label{display:block;font-size:.69rem;font-weight:600;color:var(--tm);margin-bottom:.38rem;text-transform:uppercase;letter-spacing:.07em;}
.f-in{width:100%;padding:10px 13px;border:1.5px solid var(--bdd);border-radius:11px;font-size:.875rem;color:var(--tx);background:var(--gg);outline:none;transition:border-color .2s;}
.f-in:focus{border-color:var(--gs);background:var(--wh);}
.f-in.err-field{border-color:var(--co);}
.f-ta{width:100%;padding:10px 13px;border:1.5px solid var(--bdd);border-radius:11px;font-size:.875rem;color:var(--tx);background:var(--gg);outline:none;resize:vertical;transition:border-color .2s;}
.f-ta:focus{border-color:var(--gs);}
.f-sel{width:100%;padding:10px 13px;border:1.5px solid var(--bdd);border-radius:11px;font-size:.875rem;color:var(--tx);background:var(--gg);outline:none;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.chips-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:6px 13px;border-radius:50px;border:1.5px solid var(--bd);font-size:.77rem;cursor:pointer;background:var(--wh);color:var(--tm);transition:all .18s;user-select:none;}
.chip.on{background:var(--gd);color:#fff;border-color:var(--gd);}

/* TAGS */
.tag{display:inline-block;border-radius:50px;padding:2px 9px;font-size:.63rem;font-weight:500;}
.tg{background:var(--gp);color:var(--gd);}
.tb2{background:var(--bp);color:var(--bl);}
.tr{background:var(--cp);color:var(--co);}
.tp{background:var(--lv);color:var(--pu);}
.ty{background:var(--ylp);color:var(--yl);}

/* ALERTS */
.alert{border-radius:12px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.82rem;display:flex;align-items:flex-start;gap:9px;}
.alert-success{background:var(--gp);border:1px solid var(--gl);color:var(--gd);}
.alert-error{background:var(--cp);border:1px solid rgba(224,90,58,.3);color:var(--err);}
.alert-info{background:var(--bp);border:1px solid rgba(74,123,196,.2);color:var(--bl);}

/* LOADING */
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--gl);border-top-color:var(--gd);border-radius:50%;animation:spin .7s linear infinite;}
.spinner-lg{width:36px;height:36px;border-width:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
.skeleton{background:linear-gradient(90deg,var(--gg) 25%,var(--gp) 50%,var(--gg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.loading-center{display:flex;align-items:center;justify-content:center;padding:3rem;flex-direction:column;gap:.75rem;color:var(--tmu);font-size:.85rem;}

/* EMPTY STATES */
.empty-state{text-align:center;padding:2.5rem 1rem;}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:.75rem;}
.empty-title{font-size:.92rem;font-weight:600;color:var(--tx);margin-bottom:.35rem;}
.empty-sub{font-size:.8rem;color:var(--tmu);line-height:1.6;max-width:300px;margin:0 auto .9rem;}

/* WELLNESS RING */
.wellness-panel{background:linear-gradient(135deg,var(--gg),var(--gp));border-radius:18px;border:1px solid var(--bd);padding:1.4rem;display:flex;align-items:center;gap:1.75rem;}
.wp-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tmu);margin-bottom:.25rem;}
.wp-num{font-family:'Cormorant Garamond',serif;font-size:3.8rem;font-weight:600;color:var(--tx);line-height:1;}
.wp-up{font-size:.72rem;color:var(--gs);margin-top:.25rem;}
.wp-btn{display:inline-flex;align-items:center;gap:6px;background:var(--gd);color:#fff;border-radius:50px;padding:8px 18px;font-size:.78rem;font-weight:500;margin-top:.8rem;cursor:pointer;border:none;}
.ring{position:relative;width:100px;height:100px;flex-shrink:0;}
.ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-in{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;}

/* PHASE BANNER */
.phase-banner{border-radius:16px;padding:1.1rem 1.3rem;color:#fff;display:flex;align-items:center;gap:1rem;margin-bottom:1.1rem;}
.pb-ico{font-size:1.6rem;flex-shrink:0;}
.pb-phase{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.58);margin-bottom:2px;}
.pb-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;}
.pb-desc{font-size:.76rem;color:rgba(255,255,255,.72);line-height:1.5;max-width:460px;}
.pb-right{margin-left:auto;text-align:right;flex-shrink:0;}
.pb-day-n{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;line-height:1;}
.pb-day-l{font-size:.58rem;color:rgba(255,255,255,.55);}

/* PLAN LIST */
.plan-item{display:flex;align-items:center;gap:11px;padding:.8rem 0;border-bottom:1px solid var(--bdd);}
.plan-item:last-child{border-bottom:none;}
.pi-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
.pi-name{font-size:.84rem;font-weight:500;color:var(--tx);}
.pi-sub{font-size:.7rem;color:var(--tmu);margin-top:1px;}
.pi-chk{margin-left:auto;width:25px;height:25px;border-radius:50%;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;flex-shrink:0;font-size:.72rem;color:var(--gd);}
.pi-chk.done{background:var(--gp);border-color:var(--gs);}

/* CHARTS */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;}
.bc-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bc-bar{width:100%;border-radius:5px 5px 0 0;background:var(--gp);transition:height .5s;}
.bc-bar:hover{background:var(--gs);}
.bc-lbl{font-size:.58rem;color:var(--tmu);}
.sym-row{display:flex;align-items:center;gap:10px;padding:.5rem 0;border-bottom:1px solid var(--bdd);}
.sym-row:last-child{border-bottom:none;}
.sym-name{font-size:.78rem;color:var(--tx);width:130px;flex-shrink:0;}
.sym-bar-w{flex:1;height:6px;background:var(--gg);border-radius:3px;overflow:hidden;}
.sym-bar-f{height:100%;background:var(--gs);border-radius:3px;}
.sym-val{font-size:.7rem;font-weight:600;color:var(--gd);width:30px;text-align:right;flex-shrink:0;}

/* COMMUNITY */
.post-card{background:var(--wh);border-radius:16px;border:1px solid var(--bdd);padding:1.1rem;margin-bottom:.85rem;transition:box-shadow .18s;}
.post-card:hover{box-shadow:0 4px 18px rgba(42,90,26,.08);}
.post-h{display:flex;align-items:center;gap:8px;margin-bottom:.6rem;}
.post-av{width:32px;height:32px;border-radius:50%;background:var(--gp);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--gd);}
.post-name{font-size:.8rem;font-weight:500;color:var(--tx);}
.post-time{font-size:.62rem;color:var(--tmu);margin-left:auto;}
.post-tag{display:inline-block;background:var(--gg);color:var(--tmu);border-radius:50px;padding:2px 8px;font-size:.6rem;margin-bottom:.5rem;}
.post-body{font-size:.83rem;color:var(--tm);line-height:1.62;margin-bottom:.65rem;}
.post-acts{display:flex;gap:12px;}
.post-act{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--tmu);cursor:pointer;transition:color .15s;}
.post-act:hover{color:var(--gd);}

/* CHAT */
.chat-wrap{display:grid;grid-template-columns:1fr 300px;gap:1.1rem;height:calc(100vh - 140px);}
.chat-panel{background:var(--wh);border-radius:18px;border:1px solid var(--bdd);display:flex;flex-direction:column;overflow:hidden;}
.chat-h{padding:.85rem 1.1rem;border-bottom:1px solid var(--bdd);display:flex;align-items:center;gap:9px;flex-shrink:0;}
.chat-av{width:34px;height:34px;border-radius:50%;background:var(--gp);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.chat-title{font-size:.88rem;font-weight:600;color:var(--tx);}
.chat-status{font-size:.63rem;color:var(--gs);display:flex;align-items:center;gap:4px;}
.chat-status::before{content:'';width:5px;height:5px;background:var(--gs);border-radius:50%;}
.chat-msgs{flex:1;overflow-y:auto;padding:.85rem 1.1rem;display:flex;flex-direction:column;gap:9px;scrollbar-width:none;}
.chat-msgs::-webkit-scrollbar{display:none;}
.msg-w{display:flex;align-items:flex-end;gap:6px;}
.msg-w.u{flex-direction:row-reverse;}
.msg-av2{width:24px;height:24px;border-radius:50%;background:var(--gp);display:flex;align-items:center;justify-content:center;font-size:.82rem;flex-shrink:0;}
.msg-b{max-width:78%;padding:9px 13px;border-radius:16px;font-size:.82rem;line-height:1.55;}
.msg-b.ai{background:var(--gg);color:var(--tx);border:1px solid var(--bd);border-radius:16px 16px 16px 3px;}
.msg-b.u2{background:var(--gd);color:#fff;border-radius:16px 16px 3px 16px;}
.typing{display:flex;gap:4px;align-items:center;padding:9px 13px;}
.typing span{width:6px;height:6px;background:var(--gl);border-radius:50%;animation:tb 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.chat-qs{display:flex;gap:5px;padding:0 1.1rem .6rem;flex-wrap:wrap;}
.cq{padding:5px 10px;background:var(--gg);border:1px solid var(--bd);border-radius:50px;font-size:.7rem;color:var(--tm);cursor:pointer;transition:background .15s;white-space:nowrap;}
.cq:hover{background:var(--gp);}
.chat-input-row{padding:.65rem 1.1rem;border-top:1px solid var(--bdd);display:flex;gap:7px;flex-shrink:0;}
.chat-in{flex:1;padding:9px 13px;border:1.5px solid var(--bdd);border-radius:50px;font-size:.875rem;color:var(--tx);background:var(--gg);outline:none;transition:border-color .2s;}
.chat-in:focus{border-color:var(--gs);}
.chat-send{width:38px;height:38px;background:var(--gd);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.chat-send:hover{background:var(--gm);}
.chat-send svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ADMIN TABLE */
.a-tbl{width:100%;border-collapse:collapse;}
.a-tbl th{font-size:.63rem;font-weight:600;color:var(--tmu);text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:0 .65rem .6rem;border-bottom:1px solid var(--bdd);}
.a-tbl td{padding:.65rem .65rem;border-bottom:1px solid var(--bdd);font-size:.8rem;vertical-align:middle;}
.a-tbl tr:last-child td{border-bottom:none;}
.a-tbl tr:hover td{background:var(--gg);}
.a-av{width:28px;height:28px;border-radius:50%;background:var(--gp);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--gd);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);}
.modal{background:var(--wh);border-radius:22px;padding:2rem;width:min(480px,95vw);box-shadow:0 24px 60px rgba(0,0,0,.16);max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--tx);margin-bottom:.25rem;}
.modal-sub{font-size:.78rem;color:var(--tmu);margin-bottom:1.4rem;}

/* AUTH */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--gg) 0%,var(--wh) 60%);}
.auth-box{display:flex;width:min(840px,98vw);border-radius:26px;overflow:hidden;box-shadow:0 28px 70px rgba(42,90,26,.14);}
.auth-left{width:320px;min-width:320px;background:linear-gradient(160deg,var(--gd),var(--gm));padding:2.5rem;display:flex;flex-direction:column;justify-content:space-between;color:#fff;}
.auth-right{flex:1;background:var(--wh);padding:2.5rem;overflow-y:auto;}
.auth-left-title{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:600;line-height:1.2;margin-bottom:.5rem;}
.auth-left-title em{font-style:italic;color:var(--gl);}
.auth-left-sub{font-size:.8rem;color:rgba(255,255,255,.65);line-height:1.65;}
.auth-tabs{display:flex;gap:6px;margin-bottom:1.5rem;}
.auth-tab{padding:7px 18px;border-radius:50px;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .18s;border:1.5px solid var(--bd);color:var(--tmu);background:transparent;}
.auth-tab.on{background:var(--gd);color:#fff;border-color:var(--gd);}

/* ONBOARDING */
.ob-overlay{position:fixed;inset:0;background:var(--wh);z-index:500;display:flex;align-items:center;justify-content:center;}
.ob-box{display:flex;width:min(860px,98vw);height:min(580px,98vh);border-radius:26px;overflow:hidden;box-shadow:0 30px 80px rgba(42,90,26,.15);}
.ob-left{width:300px;min-width:300px;background:linear-gradient(160deg,var(--gd),var(--gm));padding:2.25rem;display:flex;flex-direction:column;justify-content:space-between;color:#fff;}
.ob-right{flex:1;background:var(--wh);display:flex;flex-direction:column;overflow:hidden;}
.ob-right-body{flex:1;overflow-y:auto;padding:1.75rem;}
.ob-right-body::-webkit-scrollbar{display:none;}
.ob-right-foot{padding:.9rem 1.75rem;border-top:1px solid var(--bdd);display:flex;gap:.75rem;justify-content:flex-end;flex-shrink:0;}
.ob-prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:.75rem;overflow:hidden;}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const h=React.createElement;

/* ═══════════════════════════════════════════════════════════════
   API CLIENT
═══════════════════════════════════════════════════════════════ */
const API_BASE='';  // Same origin — served by Express
let _token=sessionStorage.getItem('nia_token')||'';

const api={
  setToken(t){_token=t;if(t)sessionStorage.setItem('nia_token',t);else sessionStorage.removeItem('nia_token');},
  async req(method,path,body){
    const res=await fetch(API_BASE+'/api'+path,{
      method,
      headers:{'Content-Type':'application/json',...(_token?{Authorization:'Bearer '+_token}:{})},
      ...(body?{body:JSON.stringify(body)}:{}),
    });
    const data=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error||data.errors?.[0]?.msg||'Something went wrong');
    return data;
  },
  get:(p)=>api.req('GET',p),
  post:(p,b)=>api.req('POST',p,b),
  put:(p,b)=>api.req('PUT',p,b),
  del:(p)=>api.req('DELETE',p),
};

/* ═══════════════════════════════════════════════════════════════
   HOOKS
═══════════════════════════════════════════════════════════════ */
function useApi(fn,deps=[]){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const load=useCallback(async()=>{
    try{setLoading(true);setError(null);const d=await fn();setData(d);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[...deps]);
  useEffect(()=>{load();},[load]);
  return{data,loading,error,reload:load};
}

function useToast(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='success')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);
  },[]);
  return{toasts,success:m=>add(m,'success'),error:m=>add(m,'error'),info:m=>add(m,'info')};
}

/* ═══════════════════════════════════════════════════════════════
   LOGO
═══════════════════════════════════════════════════════════════ */
function NiaLogo({scale=1,light=false,showHealth=true}){
  const gc=light?'rgba(255,255,255,.92)':'#2A5A1A';
  const lc1=light?'rgba(255,255,255,.75)':'#7DBE57';
  const lc2=light?'rgba(255,255,255,.55)':'#4A8A2E';
  const sc=light?'rgba(255,255,255,.4)':'#7A9A6A';
  const fs=1.3*scale;const lsz=Math.round(17*scale);
  return h('div',{style:{display:'inline-flex',flexDirection:'column',alignItems:'flex-start',lineHeight:1,userSelect:'none'}},
    h('div',{style:{position:'relative',display:'inline-block'}},
      h('span',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:fs+'rem',fontWeight:600,color:gc,letterSpacing:'-.01em',display:'block',lineHeight:1}},'niA'),
      h('svg',{style:{position:'absolute',top:(-lsz*.38)+'px',right:(-lsz*.3)+'px'},width:lsz*.72,height:lsz,viewBox:'0 0 11 17',fill:'none'},
        h('line',{x1:5.5,y1:16,x2:5.5,y2:7,stroke:lc2,strokeWidth:1.2,strokeLinecap:'round'}),
        h('path',{d:'M5.5,12 C3.5,10 1,10.5 1,12.5 C3,12.8 5,12.2 5.5,12',fill:lc1}),
        h('path',{d:'M5.5,9 C7.5,7 10,7.5 10,9.5 C8,9.8 6,9.2 5.5,9',fill:lc2}),
        h('path',{d:'M5.5,7 C5,4.5 7,4 6.5,7',fill:lc1}),
      )
    ),
    showHealth&&h('span',{style:{fontSize:'.4rem',letterSpacing:'.24em',textTransform:'uppercase',color:sc,fontFamily:"'DM Sans',sans-serif",marginTop:'2px',fontWeight:400,paddingLeft:'1px'}},'HEALTH')
  );
}

/* ═══════════════════════════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════════════════════════ */
function AuthScreen({onAuth}){
  const [tab,setTab]=useState('login');
  const [f,setF]=useState({email:'',password:'',name:'',confirm:''});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  async function submit(e){
    e.preventDefault();setErr('');
    if(tab==='register'&&f.password!==f.confirm)return setErr('Passwords do not match');
    try{
      setLoading(true);
      const endpoint=tab==='login'?'/auth/login':'/auth/register';
      const payload=tab==='login'?{email:f.email,password:f.password}:{email:f.email,password:f.password,name:f.name};
      const data=await api.post(endpoint,payload);
      api.setToken(data.token);
      onAuth(data.user);
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  }
  return h('div',{className:'auth-page'},
    h('div',{className:'auth-box'},
      h('div',{className:'auth-left'},
        h('div',null,h(NiaLogo,{scale:1.05,light:true})),
        h('div',null,
          h('div',{className:'auth-left-title'},tab==='login'?h('span',null,'Welcome ',h('em',null,'back.')):h('span',null,'Start your ',h('em',null,'wellness journey.'))),
          h('div',{className:'auth-left-sub'},tab==='login'?'Your health data and cycle insights are waiting for you.':'Join thousands of women managing hormonal health with niA.')
        ),
        h('div',{style:{fontSize:'.72rem',color:'rgba(255,255,255,.4)'}},'Designed for women navigating PCOS, hormones, and everyday wellness.')
      ),
      h('div',{className:'auth-right'},
        h('div',{style:{marginBottom:'1.5rem'}},h(NiaLogo,{scale:.9})),
        h('div',{className:'auth-tabs'},
          h('div',{className:`auth-tab${tab==='login'?' on':''}`,onClick:()=>{setTab('login');setErr('');}},  'Sign in'),
          h('div',{className:`auth-tab${tab==='register'?' on':''}`,onClick:()=>{setTab('register');setErr('');}}, 'Create account')
        ),
        err&&h('div',{className:'alert alert-error'},'⚠️ ',err),
        h('form',{onSubmit:submit},
          tab==='register'&&h('div',{className:'f-group'},h('label',{className:'f-label'},'Full name'),h('input',{className:'f-in',required:true,placeholder:'e.g. Amara Wanjiku',value:f.name,onChange:ev=>setF({...f,name:ev.target.value})})),
          h('div',{className:'f-group'},h('label',{className:'f-label'},'Email address'),h('input',{className:'f-in',type:'email',required:true,placeholder:'you@example.com',value:f.email,onChange:ev=>setF({...f,email:ev.target.value})})),
          h('div',{className:'f-group'},h('label',{className:'f-label'},'Password'),h('input',{className:'f-in',type:'password',required:true,placeholder:tab==='register'?'At least 8 characters':'Enter your password',value:f.password,onChange:ev=>setF({...f,password:ev.target.value})})),
          tab==='register'&&h('div',{className:'f-group'},h('label',{className:'f-label'},'Confirm password'),h('input',{className:'f-in',type:'password',required:true,placeholder:'Re-enter password',value:f.confirm,onChange:ev=>setF({...f,confirm:ev.target.value})})),
          h('button',{className:'btn btn-g',style:{width:'100%'},type:'submit',disabled:loading},
            loading?h('span',{className:'spinner'}):(tab==='login'?'Sign in →':'Create account →')
          )
        ),
        h('p',{style:{fontSize:'.75rem',color:'var(--tmu)',textAlign:'center',marginTop:'1rem'}},'By continuing you agree to niA Health\'s Terms of Service and Privacy Policy.')
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   ONBOARDING
═══════════════════════════════════════════════════════════════ */
const OB_GOALS=['Manage PCOS','Regulate cycle','Lose weight','Improve mood','Boost energy','Fertility support','Reduce acne','Better sleep'];
const OB_SYMS=['Irregular periods','Hormonal acne','Weight gain','Mood swings','Fatigue','Hair loss','Bloating','Sugar cravings','Brain fog','Sleep issues','Cramps','Anxiety'];
const OB_LEFT=[
  {ico:'🌿',title:h('span',null,'Your hormonal health, ',h('em',null,'understood.')),sub:'Nia personalises everything around your cycle, goals, and symptoms.'},
  {ico:'🎯',title:h('span',null,'Tell us your ',h('em',null,'goals.')),sub:'We build your wellness plan around what matters most to you.'},
  {ico:'📅',title:h('span',null,'Your cycle is ',h('em',null,'unique.')),sub:'Accurate phase tracking starts with your real cycle data.'},
];

function Onboarding({user,onDone}){
  const [step,setStep]=useState(0);
  const TOTAL=3;
  const [f,setF]=useState({goals:[],symptoms:[],cycle_length:28,period_length:5,last_period_date:'',country:'',age:user.age||''});
  const [loading,setLoading]=useState(false);const [err,setErr]=useState('');
  function tog(field,v){const a=f[field];setF({...f,[field]:a.includes(v)?a.filter(x=>x!==v):[...a,v]});}
  const steps=[
    h('div',null,
      h('div',{className:'ob-q-title'},'What are your main goals?'),h('div',{className:'ob-q-sub'},'Select everything that applies to you.'),
      h('div',{className:'chips-wrap'},OB_GOALS.map(g=>h('div',{key:g,className:`chip${f.goals.includes(g)?' on':''}`,onClick:()=>tog('goals',g)},g)))
    ),
    h('div',null,
      h('div',{className:'ob-q-title'},'What symptoms do you experience?'),h('div',{className:'ob-q-sub'},'This helps Nia personalise your insights and advice.'),
      h('div',{className:'chips-wrap'},OB_SYMS.map(s=>h('div',{key:s,className:`chip${f.symptoms.includes(s)?' on':''}`,onClick:()=>tog('symptoms',s)},s)))
    ),
    h('div',null,
      h('div',{className:'ob-q-title'},'Your cycle details'),h('div',{className:'ob-q-sub'},'Used to calculate your current phase and predict your next period.'),
      h('div',{className:'f-row',style:{marginBottom:'.75rem'}},
        h('div',{className:'f-group',style:{marginBottom:0}},h('label',{className:'f-label'},'Cycle length (days)'),h('input',{className:'f-in',type:'number',min:20,max:45,value:f.cycle_length,onChange:ev=>setF({...f,cycle_length:parseInt(ev.target.value)})})),
        h('div',{className:'f-group',style:{marginBottom:0}},h('label',{className:'f-label'},'Period duration (days)'),h('input',{className:'f-in',type:'number',min:1,max:10,value:f.period_length,onChange:ev=>setF({...f,period_length:parseInt(ev.target.value)})}))
      ),
      h('div',{className:'f-group'},h('label',{className:'f-label'},'Last period start date'),h('input',{className:'f-in',type:'date',value:f.last_period_date,onChange:ev=>setF({...f,last_period_date:ev.target.value})})),
      h('div',{className:'f-row'},
        h('div',{className:'f-group',style:{marginBottom:0}},h('label',{className:'f-label'},'Your age'),h('input',{className:'f-in',type:'number',min:13,max:80,value:f.age,onChange:ev=>setF({...f,age:parseInt(ev.target.value)})})),
        h('div',{className:'f-group',style:{marginBottom:0}},h('label',{className:'f-label'},'Country'),h('input',{className:'f-in',placeholder:'e.g. Kenya',value:f.country,onChange:ev=>setF({...f,country:ev.target.value})}))
      )
    ),
  ];
  async function finish(){
    try{
      setLoading(true);setErr('');
      await api.put('/auth/me',{goals:f.goals,symptoms:f.symptoms,cycle_length:f.cycle_length,period_length:f.period_length,last_period_date:f.last_period_date||undefined,country:f.country,age:f.age||undefined});
      onDone({...user,...f});
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  }
  const L=OB_LEFT[step];
  return h('div',{className:'ob-overlay'},
    h('div',{className:'ob-box'},
      h('div',{className:'ob-left'},
        h(NiaLogo,{scale:.9,light:true}),
        h('div',{style:{margin:'1.5rem 0'}},h('div',{style:{fontSize:'2.5rem',marginBottom:'.75rem'}},L.ico),h('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.45rem',fontWeight:600,color:'rgba(255,255,255,.92)',lineHeight:1.25,marginBottom:'.5rem'}},L.title),h('div',{style:{fontSize:'.78rem',color:'rgba(255,255,255,.58)',lineHeight:1.6}},L.sub)),
        h('div',null,
          h('div',{className:'ob-prog'},h('div',{className:'ob-prog-fill',style:{width:((step+1)/TOTAL*100)+'%'}})),
          h('div',{className:'ob-step-dots',style:{marginTop:'.75rem'}},Array.from({length:TOTAL},(_,i)=>h('div',{key:i,className:`ob-dot${step===i?' on':''}`})))
        )
      ),
      h('div',{className:'ob-right'},
        h('div',{className:'ob-right-body'},
          h('div',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:'1rem',fontWeight:600,color:'var(--tmu)',marginBottom:'1.25rem'}},'Step '+(step+1)+' of '+TOTAL),
          err&&h('div',{className:'alert alert-error'},'⚠️ ',err),
          steps[step]
        ),
        h('div',{className:'ob-right-foot'},
          step>0&&h('button',{className:'btn btn-o btn-sm',onClick:()=>setStep(step-1)},'← Back'),
          h('button',{className:'btn btn-g btn-sm',disabled:loading,onClick:()=>{if(step<TOTAL-1)setStep(step+1);else finish();}},
            loading?h('span',{className:'spinner'}):(step<TOTAL-1?'Continue →':'Start my journey 🌿')
          )
        )
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   HOME
═══════════════════════════════════════════════════════════════ */
const PLAN_ITEMS=[
  {ico:'🥗',bg:'var(--gp)',name:'Balanced breakfast',sub:'High protein, whole foods',id:'bf'},
  {ico:'🚶‍♀️',bg:'var(--gp)',name:'30 min walk',sub:'Move your body',id:'walk'},
  {ico:'🧘‍♀️',bg:'var(--lv)',name:'10 min mindfulness',sub:'Breathe. Relax. Reset.',id:'mind'},
  {ico:'💊',bg:'var(--bp)',name:'Take your supplements',sub:'Log in Supplements tab',id:'supp'},
  {ico:'💧',bg:'var(--bp)',name:'Drink 8 glasses of water',sub:'Track in Daily Log',id:'water'},
];

function HomeScreen({user,setPage,toast}){
  const {data:cycleData,loading:cycleLoading}=useApi(()=>api.get('/cycle/current'));

          h('div',{ref:endRef})

/* ═══════════════════════════════════════════════════════════════
   PAYMENT SETTINGS SCREEN (Admin)
═══════════════════════════════════════════════════════════════ */
function PaymentSettings({toast}) {
  const [settings, setSettings] = React.useState({});
  const [revealed, setRevealed] = React.useState({});
  const [edited, setEdited] = React.useState({});
  const [saving, setSaving] = React.useState(false);
  const [revenue, setRevenue] = React.useState(null);

  React.useEffect(() => {
    api.get('/payments/settings').then(d => setSettings(d.settings)).catch(() => {});
    api.get('/payments/revenue').then(d => setRevenue(d)).catch(() => {});
  }, []);

  function setValue(key, val) { setEdited(e => ({...e, [key]: val})); }
  function getCurrentVal(key) { return edited[key] !== undefined ? edited[key] : (settings[key]?.value || ''); }
  function toggleReveal(key) { setRevealed(r => ({...r, [key]: !r[key]})); }

  async function saveSettings() {
    if (!Object.keys(edited).length) return toast.info('No changes to save.');
    try {
      setSaving(true);
      await api.put('/payments/settings', edited);
      // Refresh settings
      const d = await api.get('/payments/settings');
      setSettings(d.settings);
      setEdited({});
      toast.success('Payment settings saved securely.');
    } catch(e) { toast.error(e.message); }
    finally { setSaving(false); }
  }

  const fields = [
    { key: 'paystack_secret_key',  label: 'Paystack Secret Key',  sensitive: true,  hint: 'Starts with sk_live_ or sk_test_', placeholder: 'sk_live_...' },
    { key: 'paystack_public_key',  label: 'Paystack Public Key',   sensitive: true,  hint: 'Starts with pk_live_ or pk_test_', placeholder: 'pk_live_...' },
    { key: 'currency',             label: 'Primary Currency',       sensitive: false, placeholder: 'KES' },
    { key: 'business_name',        label: 'Business Name',          sensitive: false, placeholder: 'niA Health' },
    { key: 'support_email',        label: 'Support Email',          sensitive: false, placeholder: 'support@niahealth.com' },
    { key: 'wellness_price_kes',   label: 'Wellness Price (KES)',    sensitive: false, placeholder: '500' },
    { key: 'premium_price_kes',    label: 'Premium Price (KES)',     sensitive: false, placeholder: '1200' },
    { key: 'wellness_price_usd',   label: 'Wellness Price (USD)',    sensitive: false, placeholder: '5' },
    { key: 'premium_price_usd',    label: 'Premium Price (USD)',     sensitive: false, placeholder: '12' },
  ];

  return h('div', {className: 'screen'},
    // Revenue cards
    revenue && h('div', {className: 'revenue-cards'},
      h('div', {className: 'revenue-card'},
        h('div', {className: 'rc-label'}, 'Total Revenue'),
        h('div', {className: 'rc-value'}, 'KES ' + (revenue.total || 0).toLocaleString()),
        h('div', {className: 'rc-sub'}, 'All time')
      ),
      h('div', {className: 'revenue-card', style: {background: 'linear-gradient(135deg,#2A5FAA,#4A7BC4)'}},
        h('div', {className: 'rc-label'}, 'This Month'),
        h('div', {className: 'rc-value'}, 'KES ' + (revenue.monthly || 0).toLocaleString()),
        h('div', {className: 'rc-sub'}, 'Last 30 days')
      ),
      h('div', {className: 'revenue-card', style: {background: 'linear-gradient(135deg,#5C4A9A,#7C5CBF)'}},
        h('div', {className: 'rc-label'}, 'Transactions'),
        h('div', {className: 'rc-value'}, revenue.recent?.length || 0),
        h('div', {className: 'rc-sub'}, 'Recent payments')
      )
    ),

    // Settings form
    h('div', {className: 'card'},
      h('div', {className: 'card-header'},
        h('div', null,
          h('div', {className: 'card-title'}, '🔐 Payment Configuration'),
          h('div', {className: 'card-sub'}, 'Paystack processes all payments — card, M-Pesa, bank transfer, USSD')
        ),
        Object.keys(edited).length > 0 && h('button', {className: 'btn btn-primary btn-sm', onClick: saveSettings, disabled: saving},
          saving ? 'Saving...' : 'Save Changes'
        )
      ),
      h('div', {className: 'pay-settings-grid'},
        fields.map(f => h('div', {key: f.key, className: 'pay-field'},
          h('div', {className: 'pay-label'},
            f.label,
            f.sensitive && h('span', {className: 'sensitive-badge'}, '🔒 SENSITIVE'),
            settings[f.key]?.set
              ? h('span', {className: 'pay-status-badge pay-status-set'}, '✓ Set')
              : h('span', {className: 'pay-status-badge pay-status-empty'}, '! Not set')
          ),
          h('div', {className: 'pay-input-wrap'},
            h('input', {
              className: 'pay-input',
              type: f.sensitive && !revealed[f.key] ? 'password' : 'text',
              placeholder: revealed[f.key] ? f.placeholder : (settings[f.key]?.masked || f.placeholder),
              value: getCurrentVal(f.key),
              onChange: e => setValue(f.key, e.target.value),
            }),
            f.sensitive && h('button', {
              className: 'pay-reveal ' + (revealed[f.key] ? 'revealed' : ''),
              onClick: () => toggleReveal(f.key),
              title: revealed[f.key] ? 'Hide' : 'Reveal'
            }, revealed[f.key] ? '🔒 Hide' : '👁 Show')
          ),
          f.hint && h('div', {style: {fontSize: '.68rem', color: 'var(--tmu)', marginTop: '4px'}}, f.hint)
        ))
      ),
      h('div', {style: {marginTop: '1.5rem', padding: '1rem', background: 'var(--gg)', borderRadius: '14px', fontSize: '.82rem', color: 'var(--tmu)', lineHeight: 1.6}},
        '🌍 Paystack supports: Card (Visa/Mastercard), M-Pesa, Bank Transfer, USSD, Mobile Money. Get your keys at ',
        h('a', {href: 'https://dashboard.paystack.com', target: '_blank', style: {color: 'var(--gd)'}}, 'dashboard.paystack.com')
      )
    ),

    // Recent payments table
    revenue?.recent?.length > 0 && h('div', {className: 'card'},
      h('div', {className: 'card-header'},
        h('div', {className: 'card-title'}, '💳 Recent Payments')
      ),
      h('div', {style: {overflowX: 'auto'}},
        h('table', {className: 'payments-table'},
          h('thead', null, h('tr', null,
            ['User', 'Plan', 'Amount', 'Method', 'Status', 'Date'].map(col =>
              h('th', {key: col}, col)
            )
          )),
          h('tbody', null, revenue.recent.map(p =>
            h('tr', {key: p.id},
              h('td', null, h('div', null, h('strong', null, p.user_name), h('div', {style: {fontSize: '.72rem', color: 'var(--tmu)'}}, p.email))),
              h('td', null, h('span', {className: 'tag tg'}, p.plan)),
              h('td', null, h('strong', null, p.currency + ' ' + parseFloat(p.amount).toLocaleString())),
              h('td', null, p.method || 'paystack'),
              h('td', null, h('span', {className: 'status-pill status-' + p.status}, p.status)),
              h('td', null, new Date(p.created_at).toLocaleDateString('en-GB', {day: 'numeric', month: 'short', year: 'numeric'}))
            )
          ))
        )
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   UPGRADE MODAL (User pays for plan)
═══════════════════════════════════════════════════════════════ */
function UpgradeModal({onClose, toast, user, onUpgraded}) {
  const [plan, setPlan] = React.useState('wellness');
  const [loading, setLoading] = React.useState(false);

  async function startPayment() {
    try {
      setLoading(true);
      const data = await api.post('/payments/initialize', {plan});
      // Redirect to Paystack checkout
      window.location.href = data.authorization_url;
    } catch(e) {
      toast.error(e.message);
      setLoading(false);
    }
  }

  return h('div', {className: 'upgrade-modal-bg', onClick: e => { if(e.target === e.currentTarget) onClose(); }},
    h('div', {className: 'upgrade-modal'},
      h('div', {style: {display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem'}},
        h('div', null,
          h('div', {style: {fontFamily: "'Cormorant Garamond',serif", fontSize: '1.5rem', fontWeight: 600}}, 'Upgrade Your Plan'),
          h('div', {style: {fontSize: '.8rem', color: 'var(--tmu)', marginTop: '2px'}}, 'Unlock full access to niA Health')
        ),
        h('button', {onClick: onClose, style: {background: 'none', border: 'none', fontSize: '1.2rem', cursor: 'pointer', color: 'var(--tmu)'}}, '×')
      ),

      h('div', {className: 'upgrade-plans'},
        // Wellness Plan
        h('div', {className: 'upgrade-plan' + (plan === 'wellness' ? ' selected' : ''), onClick: () => setPlan('wellness')},
          h('div', {className: 'up-name'}, 'Wellness'),
          h('div', {className: 'up-price'}, 'KES 500', h('span', null, '/mo')),
          h('ul', {className: 'up-features'},
            ['Unlimited Nia AI chat', 'Full meal plans', 'Phase workouts', 'Advanced analytics'].map(f =>
              h('li', {key: f}, f)
            )
          )
        ),
        // Premium Plan
        h('div', {className: 'upgrade-plan popular' + (plan === 'premium' ? ' selected' : ''), onClick: () => setPlan('premium')},
          h('div', {className: 'up-name'}, 'Premium'),
          h('div', {className: 'up-price'}, 'KES 1,200', h('span', null, '/mo')),
          h('ul', {className: 'up-features'},
            ['Everything in Wellness', 'Personalised supplements', 'Lab result guidance', 'Monthly health report'].map(f =>
              h('li', {key: f}, f)
            )
          )
        )
      ),

      h('div', {style: {background: 'var(--gg)', borderRadius: '14px', padding: '1rem', marginBottom: '1.25rem', fontSize: '.82rem', color: 'var(--tmu)', textAlign: 'center'}},
        '🔒 Secure payment via Paystack. Supports M-Pesa, Card, Bank Transfer, USSD.'
      ),

      h('button', {className: 'btn btn-primary', onClick: startPayment, disabled: loading, style: {width: '100%'}},
        loading ? '⏳ Redirecting to payment...' : `Pay with Paystack — KES ${plan === 'wellness' ? '500' : '1,200'}/month`
      ),
      h('p', {style: {textAlign: 'center', fontSize: '.75rem', color: 'var(--tmu)', marginTop: '.75rem'}},
        'Cancel anytime. No hidden fees.'
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('home');
  const [slim,setSlim]=useState(false);
  const [showUpgrade,setShowUpgrade]=useState(false);
  const [showAdminLogin,setShowAdminLogin]=useState(false);
  const [adminUser,setAdminUser]=useState(null);
  const [booting,setBooting]=useState(true);
  const toast=useToast();
  const {data:cycleSnap}=useApi(()=>user?api.get('/cycle/current'):Promise.resolve(null),[user?.id]);

  useEffect(()=>{
    const t=sessionStorage.getItem('nia_token');
    if(t){api.setToken(t);api.get('/auth/me').then(d=>{setUser(d.user);setBooting(false);}).catch(()=>{api.setToken('');setBooting(false);});}
    else setBooting(false);
  },[]);

  function logout(){api.setToken('');setUser(null);setAdminUser(null);setPage('home');}

  if(booting)return h('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'1rem',background:'var(--wh)'}},h('div',{style:{marginBottom:'.5rem'}},h(NiaLogo,{scale:1.2})),h('div',{className:'spinner spinner-lg'}));
  if(!user)return h('div',null,h(AuthScreen,{onAuth:u=>{setUser(u);}}),h('style',null,'@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}'));
  if(adminUser)return h('div',null,h(AdminPanel,{user:adminUser,onExit:()=>setAdminUser(null),toast}),h(Toasts,{toasts:toast.toasts}),
    showUpgrade&&h(UpgradeModal,{onClose:()=>setShowUpgrade(false),toast,user,onUpgraded:(plan)=>{setUser(u=>({...u,plan}));setShowUpgrade(false);}}));

  // Check if profile complete (has goals)
  const needsOnboarding=!user.goals?.length;

  const secs=[...new Set(MAIN_NAV.map(n=>n.sec))];
  const SCREENS={home:h(HomeScreen,{user,setPage,toast}),cycle:h(CycleScreen,{user,toast}),log:h(LogScreen,{toast}),journey:h(JourneyScreen),community:h(CommunityScreen,{user,toast}),chat:h(ChatScreen),meals:h(MealsScreen),movement:h(MovementScreen,{user}),supplements:h(SuppsScreen,{toast}),notifications:h(NotificationsScreen,{toast}),profile:h(ProfileScreen,{user,setUser,toast})};
  const score=cycleSnap?.score||0;

  return h('div',null,
    h('style',null,'@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}'),
    needsOnboarding&&h(Onboarding,{user,onDone:u=>setUser(u)}),
    h('div',{className:'layout'},
      h('div',{className:`sidebar${slim?' slim':''}`},
        h('div',{className:'sb-top'},
          h('div',{className:'sb-logo-row'},
            !slim&&h(NiaLogo,{scale:.85,light:true}),
            slim&&h('div',{style:{fontSize:'1rem'}},'🌿'),
            h('button',{className:'sb-collapse-btn',onClick:()=>setSlim(!slim)},slim?'→':'←')
          )
        ),
        h('div',{className:'sb-nav'},
          secs.map(sec=>h('div',{key:sec},
            h('div',{className:'sb-section'},sec),
            MAIN_NAV.filter(n=>n.sec===sec).map(n=>h('div',{key:n.id,className:`sb-item${page===n.id?' active':''}`,onClick:()=>setPage(n.id),title:slim?n.l:''},h('span',{className:'sb-ico'},n.ic),h('span',{className:'sb-lbl'},n.l)))
          ))
        ),
        h('div',{className:'sb-foot'},
          h('div',{className:'sb-user-row'},
            h('div',{className:'sb-av'},((user.name||'U').slice(0,2).toUpperCase())),
            !slim&&h('div',null,h('div',{className:'sb-uname'},user.name||'User'),h('div',{className:'sb-urole'},user.plan||'Free'))
          ),
          !slim&&h('button',{style:{marginTop:'.65rem',width:'100%',padding:'6px',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',color:'rgba(255,255,255,.45)',borderRadius:'7px',cursor:'pointer',fontSize:'.72rem'},onClick:logout},'Sign out')
        )
      ),
      h('div',{className:'main'},
        h(Topbar,{user,score,setPage,showNotifs:false,setShowNotifs:()=>{setPage('notifications');}}),
        h('div',{className:'content-area'},SCREENS[page]||SCREENS.home),
        h('footer',null,
          h('div',{className:'ft-l'},'© 2025 niA Health · Built for women, by women'),
          h('div',{className:'ft-r'},
            h('span',{className:'ft-link'},'Privacy'),
            h('span',{className:'ft-link'},'Terms'),
            h('span',{className:'ft-link'},'Support'),
            h('span',{className:'ft-admin',onClick:()=>setShowAdminLogin(true)},'admin')
          )
        )
      )
    ),
    h(Toasts,{toasts:toast.toasts}),
    showAdminLogin&&h(AdminLoginModal,{onClose:()=>setShowAdminLogin(false),onLogin:u=>{setAdminUser(u);setShowAdminLogin(false);}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
