<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="niA Health">
<meta name="theme-color" content="#2A5A1A">
<title>niA Health</title>
<link rel="manifest" href="/mobile/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gd:#2A5A1A;--gm:#4A8A2E;--gs:#7DBE57;--gl:#C2DFB0;--gp:#E8F4DF;--gg:#F2F8EE;
  --cr:#FAF9F5;--wh:#fff;--tx:#1A2F12;--tm:#3D5A2E;--tmu:#7A9A6A;
  --bd:rgba(74,138,46,0.14);--bdd:rgba(0,0,0,0.07);
  --co:#E05A3A;--cp:#FEF0EC;--bl:#4A7BC4;--bp:#E8F0FA;
  --pu:#7C5CBF;--lv:#EEE8F8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--tx);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}

/* ── SHELL ── */
.shell{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;
  background:var(--cr);
  box-shadow:0 0 40px rgba(0,0,0,.15);
  overflow:hidden;
}
.screen{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 8px);
}
.screen::-webkit-scrollbar{display:none;}

/* ── STATUS BAR ── */
.status-bar{
  height:calc(var(--safe-top) + 44px);
  background:var(--wh);
  display:flex;align-items:flex-end;
  padding:0 1.25rem .6rem;
  flex-shrink:0;
}

/* ── BOTTOM NAV ── */
.bnav{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--wh);
  border-top:1px solid var(--bdd);
  display:flex;align-items:center;justify-content:space-around;
  padding:.5rem 0;
  padding-bottom:calc(.5rem + var(--safe-bot));
  z-index:100;
  height:calc(var(--nav-h) + var(--safe-bot));
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 10px;cursor:pointer;
  opacity:.38;transition:opacity .2s;
  min-width:52px;
}
.nav-item.active{opacity:1;}
.nav-icon{font-size:1.35rem;line-height:1;}
.nav-label{font-size:.6rem;font-weight:500;color:var(--tm);letter-spacing:.02em;}
.nav-item.active .nav-label{color:var(--gd);}
.nav-fab{
  width:54px;height:54px;
  background:var(--gd);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;cursor:pointer;
  box-shadow:0 4px 18px rgba(42,90,26,.4);
  margin-top:-20px;
  transition:transform .2s,box-shadow .2s;
  flex-shrink:0;
}
.nav-fab:active{transform:scale(.94);box-shadow:0 2px 10px rgba(42,90,26,.3);}

/* ── PAGE HEADER ── */
.ph{
  padding:1rem 1.25rem .5rem;
  background:var(--wh);
  border-bottom:1px solid var(--bdd);
  flex-shrink:0;
}
.ph-row{display:flex;align-items:center;justify-content:space-between;}
.ph-back{font-size:1.4rem;cursor:pointer;padding:.25rem;line-height:1;}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--tx);}
.ph-action{font-size:.82rem;font-weight:500;color:var(--gd);cursor:pointer;}

/* ── CARDS ── */
.card{background:var(--wh);border-radius:20px;border:1px solid var(--bdd);padding:1.1rem;}
.card+.card{margin-top:.75rem;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.card-title{font-size:.88rem;font-weight:600;color:var(--tx);}
.card-sub{font-size:.7rem;color:var(--tmu);cursor:pointer;font-weight:500;}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border-radius:50px;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.97);}
.btn-g{background:var(--gd);color:#fff;padding:14px 24px;font-size:.9rem;width:100%;}
.btn-g:active{background:var(--gm);}
.btn-o{background:transparent;color:var(--gd);border:1.5px solid var(--bd);padding:13px 22px;font-size:.875rem;}
.btn-o:active{background:var(--gp);}
.btn-sm{padding:9px 18px;font-size:.8rem;}
.btn-red{background:var(--co);color:#fff;padding:14px;font-size:.875rem;width:100%;}

/* ── FORMS ── */
.f-group{margin-bottom:.9rem;}
.f-label{display:block;font-size:.7rem;font-weight:600;color:var(--tm);margin-bottom:.38rem;text-transform:uppercase;letter-spacing:.07em;}
.f-in{width:100%;padding:14px 16px;border:1.5px solid var(--bdd);border-radius:14px;font-size:1rem;color:var(--tx);background:var(--gg);outline:none;-webkit-appearance:none;transition:border-color .2s;}
.f-in:focus{border-color:var(--gs);background:var(--wh);}
.f-ta{width:100%;padding:14px 16px;border:1.5px solid var(--bdd);border-radius:14px;font-size:.95rem;color:var(--tx);background:var(--gg);outline:none;resize:none;-webkit-appearance:none;}
.f-ta:focus{border-color:var(--gs);}
.f-sel{width:100%;padding:14px 16px;border:1.5px solid var(--bdd);border-radius:14px;font-size:.95rem;color:var(--tx);background:var(--gg);outline:none;-webkit-appearance:none;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:8px 16px;border-radius:50px;border:1.5px solid var(--bd);font-size:.8rem;cursor:pointer;background:var(--wh);color:var(--tm);transition:all .18s;user-select:none;}
.chip:active{transform:scale(.96);}
.chip.on{background:var(--gd);color:#fff;border-color:var(--gd);}

/* ── TAGS ── */
.tag{display:inline-block;border-radius:50px;padding:3px 10px;font-size:.65rem;font-weight:500;}
.tg{background:var(--gp);color:var(--gd);}
.tb{background:var(--bp);color:var(--bl);}
.tr{background:var(--cp);color:var(--co);}
.tp{background:var(--lv);color:var(--pu);}

/* ── LOADING ── */
.spinner{display:inline-block;width:22px;height:22px;border:2.5px solid var(--gl);border-top-color:var(--gd);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.skeleton{background:linear-gradient(90deg,var(--gg) 25%,var(--gp) 50%,var(--gg) 75%);background-size:200%;animation:shimmer 1.4s infinite;border-radius:10px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;color:var(--tmu);font-size:.85rem;}

/* ── ALERTS ── */
.alert{border-radius:14px;padding:.85rem 1rem;margin-bottom:.9rem;font-size:.82rem;display:flex;align-items:flex-start;gap:9px;}
.alert-success{background:var(--gp);border:1px solid var(--gl);color:var(--gd);}
.alert-error{background:var(--cp);border:1px solid rgba(224,90,58,.25);color:var(--co);}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:2.5rem 1.5rem;}
.empty-icon{font-size:2.8rem;display:block;margin-bottom:.65rem;}
.empty-title{font-size:.95rem;font-weight:600;color:var(--tx);margin-bottom:.35rem;}
.empty-sub{font-size:.8rem;color:var(--tmu);line-height:1.6;margin-bottom:1rem;}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:calc(var(--safe-top) + 54px);left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:90%;max-width:380px;}
.toast{border-radius:14px;padding:.8rem 1rem;font-size:.82rem;font-weight:500;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.18);animation:slideDown .3s ease;text-align:center;}
.toast-success{background:var(--gd);}
.toast-error{background:var(--co);}
.toast-info{background:var(--bl);}
@keyframes slideDown{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ── AUTH ── */
.auth-page{height:100%;display:flex;flex-direction:column;background:var(--wh);}
.auth-top{background:linear-gradient(160deg,var(--gd),var(--gm));padding:calc(var(--safe-top) + 2.5rem) 2rem 2.5rem;text-align:center;color:#fff;position:relative;overflow:hidden;}
.auth-top::after{content:'';position:absolute;bottom:-30px;left:-10%;right:-10%;height:60px;background:var(--wh);border-radius:50% 50% 0 0;}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:600;margin-bottom:.25rem;}
.auth-logo-sub{font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.5);display:block;}
.auth-tagline{font-size:.88rem;color:rgba(255,255,255,.7);margin-top:.75rem;line-height:1.6;}
.auth-body{flex:1;padding:2rem 1.5rem;overflow-y:auto;}
.auth-tabs{display:flex;background:var(--gg);border-radius:14px;padding:4px;margin-bottom:1.5rem;gap:4px;}
.auth-tab{flex:1;padding:10px;border-radius:11px;font-size:.85rem;font-weight:500;text-align:center;cursor:pointer;color:var(--tmu);transition:all .2s;}
.auth-tab.on{background:var(--wh);color:var(--gd);box-shadow:0 2px 8px rgba(0,0,0,.08);}

/* ── ONBOARDING ── */
.ob-page{height:100%;display:flex;flex-direction:column;background:var(--wh);}
.ob-header{background:linear-gradient(135deg,var(--gd),var(--gm));padding:calc(var(--safe-top) + 1.25rem) 1.5rem 1.25rem;color:#fff;flex-shrink:0;}
.ob-step-info{font-size:.72rem;color:rgba(255,255,255,.55);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em;}
.ob-step-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;line-height:1.2;}
.ob-prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:1rem;overflow:hidden;}
.ob-prog-fill{height:100%;background:#fff;border-radius:2px;transition:width .4s;}
.ob-body{flex:1;overflow-y:auto;padding:1.5rem;}
.ob-body::-webkit-scrollbar{display:none;}
.ob-footer{padding:1rem 1.5rem calc(1rem + var(--safe-bot));border-top:1px solid var(--bdd);display:flex;gap:.75rem;flex-shrink:0;background:var(--wh);}

/* ── HOME ── */
.home-header{
  padding:calc(var(--safe-top) + .9rem) 1.25rem .9rem;
  background:var(--wh);
  flex-shrink:0;
}
.home-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.home-logo{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--gd);}
.home-logo span{font-size:.44rem;letter-spacing:.22em;text-transform:uppercase;color:var(--tmu);display:block;margin-top:1px;}
.home-notif{width:36px;height:36px;border-radius:50%;background:var(--gg);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:.95rem;}
.notif-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:var(--co);border-radius:50%;border:1.5px solid var(--wh);}
.greet{font-size:1.05rem;font-weight:600;color:var(--tx);}
.greet-sub{font-size:.72rem;color:var(--tmu);margin-top:1px;}
.pg{padding:.9rem 1.25rem;}

/* ── WELLNESS RING ── */
.wellness-card{
  background:linear-gradient(135deg,var(--gg),var(--gp));
  border-radius:22px;border:1px solid var(--bd);
  padding:1.2rem;
  display:flex;align-items:center;justify-content:space-between;
}
.wc-lbl{font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tmu);margin-bottom:3px;}
.wc-num{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:600;color:var(--tx);line-height:1;}
.wc-up{font-size:.7rem;color:var(--gs);margin-top:3px;}
.wc-btn{display:inline-block;background:var(--gd);color:#fff;border-radius:50px;padding:9px 18px;font-size:.72rem;font-weight:500;margin-top:.75rem;cursor:pointer;}
.ring{position:relative;width:82px;height:82px;flex-shrink:0;}
.ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-in{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}

/* ── PHASE BANNER ── */
.phase-banner{border-radius:18px;padding:1rem 1.1rem;color:#fff;margin-bottom:.75rem;}
.pb-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.55);margin-bottom:2px;}
.pb-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;}
.pb-desc{font-size:.77rem;color:rgba(255,255,255,.72);line-height:1.5;margin-top:.2rem;}
.pb-day{margin-left:auto;text-align:right;flex-shrink:0;}
.pb-day-n{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;line-height:1;}
.pb-day-l{font-size:.58rem;color:rgba(255,255,255,.5);}

/* ── QUICK GRID ── */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.75rem;}
.qi{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
.qi-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:transform .15s;}
.qi:active .qi-icon{transform:scale(.92);}
.qi-lbl{font-size:.58rem;color:var(--tmu);font-weight:500;text-align:center;}

/* ── PLAN LIST ── */
.plan-item{display:flex;align-items:center;gap:12px;padding:.85rem 0;border-bottom:1px solid var(--bdd);}
.plan-item:last-child{border-bottom:none;}
.pi-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.pi-name{font-size:.84rem;font-weight:500;color:var(--tx);}
.pi-sub{font-size:.7rem;color:var(--tmu);margin-top:2px;}
.pi-chk{margin-left:auto;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;font-size:.75rem;color:var(--gd);flex-shrink:0;}
.pi-chk.done{background:var(--gp);border-color:var(--gs);}

/* ── MINI CARDS ── */
.mini2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
.mc{background:var(--wh);border-radius:18px;padding:.9rem;border:1px solid var(--bdd);}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem;}
.mc-lbl{font-size:.62rem;color:var(--tmu);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.mc-val{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:600;color:var(--tx);line-height:1;}
.mc-sub{font-size:.68rem;color:var(--tmu);margin-top:2px;}
.mc-bar{height:4px;background:var(--gp);border-radius:2px;margin-top:8px;overflow:hidden;}
.mc-bar-f{height:100%;background:var(--gs);border-radius:2px;}
.mc-bars{display:flex;align-items:flex-end;gap:2px;height:28px;margin-top:7px;}
.mc-bars span{flex:1;background:var(--pu);border-radius:2px 2px 0 0;opacity:.55;}
.mc-bars span.hi{opacity:1;}

/* ── CYCLE ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dh{text-align:center;font-size:.58rem;font-weight:600;color:var(--tmu);padding:3px 0;text-transform:uppercase;}
.cal-d{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;cursor:pointer;transition:background .15s;}
.cal-d:active{opacity:.75;}
.cal-today{background:var(--gd);color:#fff;font-weight:700;}
.cal-period{background:var(--co);color:#fff;}
.cal-fertile{background:var(--gp);color:var(--gd);}
.cal-ovul{background:var(--gs);color:#fff;}
.cal-pred{background:var(--cp);color:var(--co);}
.cal-leg{display:flex;gap:10px;margin-top:.75rem;flex-wrap:wrap;}
.cal-leg-i{display:flex;align-items:center;gap:5px;font-size:.63rem;color:var(--tmu);}
.cal-leg-dot{width:9px;height:9px;border-radius:50%;}
.insight-row{display:flex;align-items:flex-start;gap:10px;padding:.85rem;background:var(--gg);border-radius:14px;margin-bottom:.6rem;}
.ir-ico{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
.ir-title{font-size:.83rem;font-weight:500;color:var(--tx);margin-bottom:2px;}
.ir-desc{font-size:.75rem;color:var(--tmu);line-height:1.55;}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:100%;position:relative;}
.chat-header{padding:.85rem 1.25rem;background:var(--wh);border-bottom:1px solid var(--bdd);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-av{width:38px;height:38px;border-radius:50%;background:var(--gp);display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;}
.chat-name{font-size:.9rem;font-weight:600;color:var(--tx);}
.chat-status{font-size:.64rem;color:var(--gs);display:flex;align-items:center;gap:4px;}
.chat-status::before{content:'';width:5px;height:5px;background:var(--gs);border-radius:50%;}
.chat-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:.85rem 1.1rem;display:flex;flex-direction:column;gap:10px;}
.chat-msgs::-webkit-scrollbar{display:none;}
.msg-w{display:flex;align-items:flex-end;gap:7px;}
.msg-w.u{flex-direction:row-reverse;}
.msg-av2{width:26px;height:26px;border-radius:50%;background:var(--gp);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.msg-b{max-width:82%;padding:10px 14px;border-radius:18px;font-size:.84rem;line-height:1.55;}
.msg-b.ai{background:var(--wh);color:var(--tx);border:1px solid var(--bdd);border-radius:18px 18px 18px 4px;}
.msg-b.u2{background:var(--gd);color:#fff;border-radius:18px 18px 4px 18px;}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;}
.typing span{width:6px;height:6px;background:var(--gl);border-radius:50%;animation:tb 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.chat-qs{display:flex;gap:6px;padding:0 1.1rem .65rem;overflow-x:auto;flex-shrink:0;}
.chat-qs::-webkit-scrollbar{display:none;}
.cq{white-space:nowrap;padding:7px 12px;background:var(--gg);border:1px solid var(--bd);border-radius:50px;font-size:.72rem;color:var(--tm);cursor:pointer;flex-shrink:0;}
.cq:active{background:var(--gp);}
.chat-input-bar{padding:.65rem 1rem calc(.65rem + var(--safe-bot));border-top:1px solid var(--bdd);display:flex;gap:8px;background:var(--wh);flex-shrink:0;}
.chat-in{flex:1;padding:11px 15px;border:1.5px solid var(--bdd);border-radius:50px;font-size:.9rem;color:var(--tx);background:var(--gg);outline:none;-webkit-appearance:none;}
.chat-in:focus{border-color:var(--gs);}
.chat-send{width:42px;height:42px;background:var(--gd);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.chat-send:active{background:var(--gm);}
.chat-send svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── LOG GRID ── */
.log-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.log-card{background:var(--wh);border-radius:18px;border:1px solid var(--bdd);padding:.9rem;cursor:pointer;transition:transform .15s;}
.log-card:active{transform:scale(.97);}
.lci{font-size:1.5rem;display:block;margin-bottom:.4rem;}
.lcn{font-size:.83rem;font-weight:500;color:var(--tx);}
.lcs{font-size:.7rem;color:var(--tmu);margin-top:2px;}
.mood-row{display:flex;justify-content:space-between;}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border-radius:12px;cursor:pointer;transition:background .15s;flex:1;}
.mood-btn:active,.mood-btn.on{background:var(--gp);}
.mood-e{font-size:1.5rem;}
.mood-l{font-size:.58rem;color:var(--tmu);}
.water-gs{display:flex;gap:7px;flex-wrap:wrap;margin-top:.6rem;}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const {useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;

/* ── PWA SERVICE WORKER ── */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/mobile/sw.js').catch(()=>{});
}

/* ── API CLIENT ── */
let _token=sessionStorage.getItem('nia_token')||'';
const api={
  setToken(t){_token=t;t?sessionStorage.setItem('nia_token',t):sessionStorage.removeItem('nia_token');},
  async req(method,path,body){
    const res=await fetch('/api'+path,{
      method,
      headers:{'Content-Type':'application/json',...(_token?{Authorization:'Bearer '+_token}:{})},
      ...(body?{body:JSON.stringify(body)}:{}),
    });
    const data=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error||data.errors?.[0]?.msg||'Something went wrong');
    return data;
  },
  get:p=>api.req('GET',p),
  post:(p,b)=>api.req('POST',p,b),
  put:(p,b)=>api.req('PUT',p,b),
};

/* ── HELPERS ── */
function useApi(fn,deps=[]){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const load=useCallback(async()=>{
    try{setLoading(true);setError(null);setData(await fn());}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[...deps]);
  useEffect(()=>{load();},[load]);
  return{data,loading,error,reload:load};
}

function getPhase(d){
  if(!d)return null;
  if(d<=5) return{phase:'Menstrual',emoji:'🩸',col:'#E05A3A'};
  if(d<=13)return{phase:'Follicular',emoji:'🌱',col:'#4A8A2E'};
  if(d<=16)return{phase:'Ovulation',emoji:'✨',col:'#7DBE57'};
  return{phase:'Luteal',emoji:'🌙',col:'#7C5CBF'};
}
function getDayOfCycle(last,cl=28){
  if(!last)return null;
  const diff=Math.floor((Date.now()-new Date(last))/86400000);
  return(diff%cl)+1;
}
function fmtTime(iso){return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtDate(iso){return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
const hr=new Date().getHours();
const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';

/* ── LOGO ── */
function NiaLogo({scale=1,light=false}){
  const gc=light?'rgba(255,255,255,.92)':'#2A5A1A';
  const lc1=light?'rgba(255,255,255,.75)':'#7DBE57';
  const lc2=light?'rgba(255,255,255,.55)':'#4A8A2E';
  const sc=light?'rgba(255,255,255,.4)':'#7A9A6A';
  const fs=1.3*scale;const lsz=Math.round(16*scale);
  return h('div',{style:{display:'inline-flex',flexDirection:'column',lineHeight:1,userSelect:'none'}},
    h('div',{style:{position:'relative',display:'inline-block'}},
      h('span',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:fs+'rem',fontWeight:600,color:gc,letterSpacing:'-.01em',display:'block',lineHeight:1}},'niA'),
      h('svg',{style:{position:'absolute',top:(-lsz*.38)+'px',right:(-lsz*.3)+'px'},width:lsz*.72,height:lsz,viewBox:'0 0 11 17',fill:'none'},
        h('line',{x1:5.5,y1:16,x2:5.5,y2:7,stroke:lc2,strokeWidth:1.2,strokeLinecap:'round'}),
        h('path',{d:'M5.5,12 C3.5,10 1,10.5 1,12.5 C3,12.8 5,12.2 5.5,12',fill:lc1}),
        h('path',{d:'M5.5,9 C7.5,7 10,7.5 10,9.5 C8,9.8 6,9.2 5.5,9',fill:lc2}),
        h('path',{d:'M5.5,7 C5,4.5 7,4 6.5,7',fill:lc1}),
      )
    ),
    h('span',{style:{fontSize:'.42rem',letterSpacing:'.24em',textTransform:'uppercase',color:sc,fontFamily:"'DM Sans',sans-serif",marginTop:'2px',fontWeight:400}},'HEALTH')
  );
}

/* ── TOAST ── */
function Toasts({toasts}){
  return h('div',{className:'toast-wrap'},
    toasts.map(t=>h('div',{key:t.id,className:`toast toast-${t.type}`},t.msg))
  );
}
function useToast(){
  const [toasts,setToasts]=useState([]);
  const add=(msg,type='success')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  };
  return{toasts,success:m=>add(m,'success'),error:m=>add(m,'error'),info:m=>add(m,'info')};
}

/* ── AUTH ── */
function AuthScreen({onAuth}){
  const [tab,setTab]=useState('login');
  const [f,setF]=useState({email:'',password:'',name:'',confirm:''});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  async function submit(e){
    e.preventDefault();setErr('');
    if(tab==='register'&&f.password!==f.confirm)return setErr('Passwords do not match');
    try{
      setLoading(true);
      const data=await api.post(tab==='login'?'/auth/login':'/auth/register',
        tab==='login'?{email:f.email,password:f.password}:{email:f.email,password:f.password,name:f.name});
      api.setToken(data.token);onAuth(data.user);
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  }
  return h('div',{className:'auth-page'},
    h('div',{className:'auth-top'},
      h('div',{style:{marginBottom:'.5rem'}},h(NiaLogo,{scale:1.4,light:true})),
      h('div',{className:'auth-tagline'},'Your hormonal wellness\ncompanion, always with you.')
    ),
    h('div',{className:'auth-body'},
      h('div',{className:'auth-tabs'},
        h('div',{className:`auth-tab${tab==='login'?' on':''}`,onClick:()=>{setTab('login');setErr('');}}, 'Sign in'),
        h('div',{className:`auth-tab${tab==='register'?' on':''}`,onClick:()=>{setTab('register');setErr('');}}, 'Create account')
      ),
      err&&h('div',{className:'alert alert-error'},'⚠️  ',err),
      h('form',{onSubmit:submit},
        tab==='register'&&h('div',{className:'f-group'},h('label',{className:'f-label'},'Your name'),h('input',{className:'f-in',required:true,autoComplete:'name',placeholder:'e.g. Amara Wanjiku',value:f.name,onChange:ev=>setF({...f,name:ev.target.value})})),
        h('div',{className:'f-group'},h('label',{className:'f-label'},'Email address'),h('input',{className:'f-in',type:'email',required:true,autoComplete:'email',placeholder:'you@example.com',value:f.email,onChange:ev=>setF({...f,email:ev.target.value})})),
        h('div',{className:'f-group'},h('label',{className:'f-label'},'Password'),h('input',{className:'f-in',type:'password',required:true,autoComplete:tab==='login'?'current-password':'new-password',placeholder:tab==='register'?'Min 8 characters':'Your password',value:f.password,onChange:ev=>setF({...f,password:ev.target.value})})),
        tab==='register'&&h('div',{className:'f-group'},h('label',{className:'f-label'},'Confirm password'),h('input',{className:'f-in',type:'password',required:true,autoComplete:'new-password',placeholder:'Re-enter password',value:f.confirm,onChange:ev=>setF({...f,confirm:ev.target.value})})),
        h('button',{className:'btn btn-g',type:'submit',disabled:loading},loading?h('span',{className:'spinner'}):(tab==='login'?'Sign in →':'Create account →'))
      ),
      h('p',{style:{textAlign:'center',fontSize:'.72rem',color:'var(--tmu)',marginTop:'1.25rem'}},"By continuing you agree to niA Health's Terms & Privacy Policy.")
    )
  );
}

/* ── ONBOARDING ── */
const OB_GOALS=['Manage PCOS','Regulate cycle','Lose weight','Improve mood','Boost energy','Fertility support','Reduce acne','Better sleep'];
const OB_SYMS=['Irregular periods','Hormonal acne','Weight gain','Mood swings','Fatigue','Hair loss','Bloating','Sugar cravings','Brain fog','Sleep issues','Cramps','Anxiety'];
function Onboarding({user,onDone}){
  const [step,setStep]=useState(0);
  const TOTAL=3;
  const [f,setF]=useState({goals:[],symptoms:[],cycle_length:28,period_length:5,last_period_date:'',country:'',age:''});
  const [loading,setLoading]=useState(false);const [err,setErr]=useState('');
  function tog(field,v){const a=f[field];setF({...f,[field]:a.includes(v)?a.filter(x=>x!==v):[...a,v]});}
  const STEPS=[
    {title:'What are your goals?',sub:'Select all that apply to you.',content:h('div',{className:'chips'},OB_GOALS.map(g=>h('div',{key:g,className:`chip${f.goals.includes(g)?' on':''}`,onClick:()=>tog('goals',g)},g)))},
    {title:'What symptoms do you experience?',sub:'Helps Nia personalise your insights.',content:h('div',{className:'chips'},OB_SYMS.map(s=>h('div',{key:s,className:`chip${f.symptoms.includes(s)?' on':''}`,onClick:()=>tog('symptoms',s)},s)))},
    {title:'Your cycle details',sub:'Enables phase tracking and predictions.',content:h('div',null,
      h('div',{className:'f-group'},h('label',{className:'f-label'},'Age'),h('input',{className:'f-in',type:'number',placeholder:'e.g. 26',value:f.age,onChange:ev=>setF({...f,age:ev.target.value})})),
      h('div',{className:'f-group'},h('label',{className:'f-label'},'Country'),h('input',{className:'f-in',placeholder:'e.g. Kenya',value:f.country,onChange:ev=>setF({...f,country:ev.target.value})})),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.75rem',marginBottom:'.75rem'}},
        h('div',null,h('label',{className:'f-label'},'Cycle length'),h('input',{className:'f-in',type:'number',min:20,max:45,value:f.cycle_length,onChange:ev=>setF({...f,cycle_length:parseInt(ev.target.value)})})),
        h('div',null,h('label',{className:'f-label'},'Period days'),h('input',{className:'f-in',type:'number',min:1,max:10,value:f.period_length,onChange:ev=>setF({...f,period_length:parseInt(ev.target.value)})}))
      ),
      h('div',{className:'f-group'},h('label',{className:'f-label'},'Last period date'),h('input',{className:'f-in',type:'date',value:f.last_period_date,onChange:ev=>setF({...f,last_period_date:ev.target.value})}))
    )},
  ];
  async function finish(){
    try{setLoading(true);setErr('');
      await api.put('/auth/me',{goals:f.goals,symptoms:f.symptoms,cycle_length:f.cycle_length,period_length:f.period_length,last_period_date:f.last_period_date||undefined,country:f.country||undefined,age:parseInt(f.age)||undefined});
      onDone({...user,...f});
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  }
  const S=STEPS[step];
  return h('div',{className:'ob-page'},
    h('div',{className:'ob-header'},
      h(NiaLogo,{scale:.85,light:true}),
      h('div',{style:{marginTop:'.9rem'}},
        h('div',{className:'ob-step-info'},'Step '+(step+1)+' of '+TOTAL),
        h('div',{className:'ob-step-title'},S.title)
      ),
      h('div',{className:'ob-prog'},h('div',{className:'ob-prog-fill',style:{width:((step+1)/TOTAL*100)+'%'}}))
    ),
    h('div',{className:'ob-body'},
      h('p',{style:{fontSize:'.82rem',color:'var(--tmu)',marginBottom:'1.1rem'}},S.sub),
      err&&h('div',{className:'alert alert-error'},err),
      S.content
    ),
    h('div',{className:'ob-footer'},
      step>0&&h('button',{className:'btn btn-o btn-sm',style:{flex:'0 0 auto'},onClick:()=>setStep(step-1)},'← Back'),
      h('button',{className:'btn btn-g btn-sm',style:{flex:1},disabled:loading,onClick:()=>step<TOTAL-1?setStep(step+1):finish()},
        loading?h('span',{className:'spinner'}):step<TOTAL-1?'Continue →':'Start my journey 🌿')
    )
  );
}

/* ── HOME ── */
const PLAN_ITEMS=[
  {ico:'🥗',bg:'var(--gp)',name:'Balanced breakfast',sub:'High protein, whole foods',id:'bf'},
  {ico:'🚶‍♀️',bg:'var(--gp)',name:'30 min walk',sub:'Move your body',id:'walk'},
  {ico:'🧘‍♀️',bg:'var(--lv)',name:'10 min mindfulness',sub:'Breathe. Relax. Reset.',id:'mind'},
  {ico:'💊',bg:'var(--bp)',name:'Take supplements',sub:'Log in Supplements tab',id:'supp'},
];
function HomeScreen({user,setPage,toast}){
  const {data:cycle}=useApi(()=>api.get('/cycle/current'));
  const [checked,setChecked]=useState([]);
  const [water,setWater]=useState(0);
  const score=cycle?.score||0;
  const circ=2*Math.PI*38;
  const phase=cycle?.phase;
  const day=cycle?.dayOfCycle;
  async function logWater(v){
    setWater(v);
    try{await api.post('/logs',{log_type:'water',numeric_value:v});}catch{}
  }
  const SLP=[5.5,7.2,6.1,7.8,5.8,7.4,3.5];const ms=Math.max(...SLP);
  return h('div',null,
    h('div',{className:'home-header'},

    h('div',{className:'screen'},
      loading?h('div',{className:'loading-full'},h('div',{className:'spinner'})):
      notifs.length===0
        ?h('div',{className:'empty',style:{marginTop:'2rem'}},h('span',{className:'empty-icon'},'🔔'),h('div',{className:'empty-title'},'All caught up'),h('div',{className:'empty-sub'},'Notifications from niA Health will appear here.'))
        :notifs.map(n=>h('div',{key:n.id,className:`notif-item${!n.is_read?' notif-unread':''}`},
          h('div',{className:'notif-icon',style:{background:n.type==='welcome'?'var(--gp)':n.type==='broadcast'?'var(--lv)':'var(--bp)'}},n.type==='welcome'?'🌿':n.type==='broadcast'?'📣':'🔔'),
          h('div',{style:{flex:1}},h('div',{className:'notif-title'},n.title),h('div',{className:'notif-body'},n.body),h('div',{className:'notif-time'},fmtDate(n.created_at))),
          !n.is_read&&h('div',{style:{width:8,height:8,background:'var(--gd)',borderRadius:'50%',flexShrink:0,marginTop:4}})
        ))
    )
  );
}

/* ── NAV CONFIG ── */
const TABS=[
  {id:'home',label:'Home',icon:'🏠'},
  {id:'cycle',label:'Cycle',icon:'📅'},
  {id:'log',label:'Log',icon:'📝',fab:true},
  {id:'community',label:'Connect',icon:'🌸'},
  {id:'profile',label:'Profile',icon:'👤'},
];

/* ── MAIN APP ── */
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('home');
  const [booting,setBooting]=useState(true);
  const toast=useToast();

  useEffect(()=>{
    const t=sessionStorage.getItem('nia_token');
    if(t){
      api.setToken(t);
      api.get('/auth/me')
        .then(d=>{setUser(d.user);})
        .catch(()=>{api.setToken('');})
        .finally(()=>setBooting(false));
    } else setBooting(false);
  },[]);

  function logout(){api.setToken('');setUser(null);setPage('home');}

  if(booting)return h('div',{className:'shell'},h('div',{className:'loading-full'},h(NiaLogo,{scale:1.2}),h('div',{className:'spinner',style:{marginTop:'1rem'}})));
  if(!user)return h('div',{className:'shell'},h(AuthScreen,{onAuth:u=>setUser(u)}),h(Toasts,{toasts:toast.toasts}));

  const needsOb=!user.goals?.length;
  if(needsOb)return h('div',{className:'shell'},h(Onboarding,{user,onDone:u=>setUser(u)}),h(Toasts,{toasts:toast.toasts}));

  const isChat=page==='chat';
  const isSubpage=['meals','movement','supps','notifs','journey'].includes(page);

  const SCREENS={
    home:h(HomeScreen,{user,setPage,toast}),
    cycle:h(CycleScreen,{user,toast}),
    log:h(LogScreen,{toast}),
    community:h(CommunityScreen,{user,toast}),
    profile:h(ProfileScreen,{user,setUser,toast,onLogout:logout}),
    chat:null,
    meals:h('div',null,h('div',{className:'ph'},h('div',{className:'ph-row'},h('span',{className:'ph-back',onClick:()=>setPage('home')},'←'),h('div',{className:'ph-title'},'Meal Plans 🥗'))),h(MealsScreen)),
    movement:h('div',null,h(MovementScreen,{user})),
    supps:h(SuppsScreen,{toast}),
    notifs:h(NotificationsScreen,{toast}),
    journey:h(JourneyScreen),
  };

  return h('div',{className:'shell'},
    h('div',{style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}},
      isChat
        ?h('div',{style:{display:'flex',flexDirection:'column',height:'100%'}},
            h('div',{className:'ph'},h('div',{className:'ph-row'},h('span',{className:'ph-back',onClick:()=>setPage('home')},'←'),h('div',{className:'ph-title'},'Chat with Nia'),h('div',{className:'chat-status',style:{marginLeft:'auto'}},'Online'))),
            h(ChatScreen,{user})
          )
        :h('div',{style:{display:'flex',flexDirection:'column',height:'100%'}},SCREENS[page]||SCREENS.home)
    ),
    !isChat&&h('div',{className:'bnav'},
      TABS.map(t=>t.fab
        ?h('div',{key:'fab',className:'nav-fab',onClick:()=>setPage('chat')},'💬')
        :h('div',{key:t.id,className:`nav-item${page===t.id?' active':''}`,onClick:()=>setPage(t.id)},
            h('div',{className:'nav-icon'},t.icon),
            h('span',{className:'nav-label'},t.label)
          )
      )
    ),
    h(Toasts,{toasts:toast.toasts})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
